<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Tracker Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-copy">
        <h1>Welcome</h1>
      </div>

      <form class="login-form" id="loginForm">
        <h2>Login</h2>
        <p class="muted">Default demo login: admin / admin</p>
        <input id="loginUsername" type="text" placeholder="Username or email" autocomplete="username">
        <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
        <button type="submit">Login</button>
        <p class="form-error" id="loginError"></p>
      </form>
    </div>
  </section>
  <script src="login.js?v=1"></script>
</body>
</html>
