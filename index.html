<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Tracker Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-copy">
        <p class="eyebrow">Schedule Tracker Hub</p>
        <h1>Sign in to open your planning dashboard.</h1>
        <p class="muted">
          Manage schedules, leave types, projects, meetings, and team workloads from one place.
        </p>
        <div class="login-points">
          <span>Daily, weekly, monthly tracking</span>
          <span>Multi-user ready structure</span>
          <span>Corporate and government friendly</span>
        </div>
      </div>

      <form class="login-form" id="loginForm">
        <h2>Login</h2>
        <p class="muted">Default demo login: admin / admin</p>
        <input id="loginUsername" type="text" placeholder="Username or email" autocomplete="username">
        <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
        <button type="submit">Login</button>
        <p class="form-error" id="loginError"></p>
      </form>
    </div>
  </section>
  <script src="login.js?v=1"></script>
</body>
</html>
